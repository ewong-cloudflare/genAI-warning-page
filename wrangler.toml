name = "genai-interstitial"
main = "src/index.js"
compatibility_date = "2026-05-13"

# Run `wrangler kv namespace create INTERSTITIAL_CONFIG` and paste the id below.
# Optionally `wrangler kv namespace create INTERSTITIAL_CONFIG --preview` for preview_id.
[[kv_namespaces]]
binding = "INTERSTITIAL_CONFIG"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"
